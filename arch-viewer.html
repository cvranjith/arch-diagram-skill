<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCI Architecture Viewer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --ocean: #2C5967;
    --sienna: #AE562C;
    --air: #FCFBFA;
    --neutral-1: #F5F4F2;
    --neutral-2: #DFDCD8;
    --neutral-3: #9E9892;
    --neutral-4: #70736E;
    --bark: #312D2A;
    --oracle-red: #C74634;
    --ivy: #759C6C;
    --vivid-teal:   #0F8799;
    --vivid-orange: #E06520;
    --vivid-cobalt: #1E5DAB;
    --vivid-forest: #2E8C46;
    --vivid-grape:  #7B4FA0;
    --card-shadow: 0 1px 4px rgba(49,45,42,0.10), 0 0 0 1px rgba(49,45,42,0.06);
    --slide-width: 1366px;
    --slide-height: 768px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--neutral-1);
    font-family: "Oracle Sans", "Segoe UI", Arial, Calibri, sans-serif;
    color: var(--bark);
  }

  /* ── Viewer nav bar ── */
  .viewer-nav {
    height: 44px;
    background: #142830;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 1000;
    overflow: hidden;
  }
  .viewer-nav .oci-logo { height: 18px; filter: brightness(0) invert(1); flex-shrink: 0; }

  /* Diagram title (shown after load) */
  #diagInfo {
    display: none;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }
  #diagTitle {
    color: rgba(255,255,255,0.9);
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 380px;
  }
  /* File chip — lives in nav-right, shown after load */
  #fileChip {
    display: none;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 4px;
    font-size: 10px;
    color: rgba(255,255,255,0.45);
    padding: 2px 7px;
    white-space: nowrap;
    font-family: ui-monospace, "SF Mono", monospace;
    flex-shrink: 0;
    align-items: center;
  }

  /* Version nav in top bar */
  #verNavInline {
    display: none;
    align-items: center;
    gap: 1px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 16px;
    padding: 3px 6px;
    flex-shrink: 0;
  }
  #verNavInline button {
    background: none;
    border: none;
    color: rgba(255,255,255,0.75);
    padding: 2px 7px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    line-height: 1;
  }
  #verNavInline button:hover:not(:disabled) { background: rgba(255,255,255,0.14); color: #fff; }
  #verNavInline button:disabled { opacity: 0.3; cursor: default; }
  #verNavInline .ver-cur {
    font-weight: 700;
    color: #fff;
    background: rgba(255,255,255,0.13);
    padding: 2px 9px;
    border-radius: 12px;
    font-size: 11px;
  }
  #verNavInline .ver-sep { color: rgba(255,255,255,0.28); font-size: 9px; padding: 0 1px; }

  .viewer-nav-right { margin-left: auto; display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .nav-btn {
    border: 1px solid rgba(255,255,255,0.24);
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.95);
    border-radius: 5px;
    font-size: 11px;
    padding: 4px 9px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.16); }
  .nav-btn.active { border-color: rgba(255,255,255,0.52); background: rgba(255,255,255,0.22); }
  .nav-btn:disabled { opacity: 0.38; cursor: default; }

  /* ── Drop zone ── */
  #dropZone {
    min-height: calc(100vh - 44px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    text-align: center;
    padding: 40px 24px;
    transition: background 0.15s;
  }
  #dropZone.drag-over { background: rgba(44,89,103,0.06); }
  .drop-icon {
    width: 80px; height: 80px; border-radius: 50%;
    background: rgba(44,89,103,0.10);
    border: 2px dashed rgba(44,89,103,0.35);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: var(--ocean);
  }
  .drop-title { font-size: 22px; font-weight: 700; color: var(--bark); margin: 0; }
  .drop-sub { font-size: 13px; color: var(--neutral-4); margin: 0; }
  .drop-btn {
    background: var(--ocean); color: #FFFFFF; border: none;
    border-radius: 6px; padding: 10px 24px;
    font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .drop-btn:hover { background: #234750; }
  #fileInput { display: none; }

  /* ── Diagram mount area ── */
  #diagramMount { display: none; position: relative; }

  /* ── Slide layout ── */
  .slide-viewport { min-height: calc(100vh - 44px); }
  .slide-frame { width: 100%; }
  .diagram-shell { min-height: calc(100vh - 44px); background: var(--neutral-1); }

  body.slide-layout .slide-viewport {
    height: calc(100vh - 44px);
    padding: 16px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow: hidden;
    background: #1C2B32; /* dark presentation bg so slide pops */
  }
  body.slide-layout.slide-scroll .slide-viewport { overflow: auto; }
  body.slide-layout .slide-frame { flex: 0 0 auto; position: relative; }
  body.slide-layout .diagram-shell {
    width: var(--slide-width);
    min-height: var(--slide-height);
    margin: 0;
    box-shadow: 0 8px 48px rgba(0,0,0,0.55), 0 0 0 1px rgba(0,0,0,0.22);
    transform-origin: top left;
  }

  /* ── Diagram base styles (used inside mount) ── */
  .diagram-canvas {
    padding: 20px 24px;
    min-height: calc(100vh - 44px);
    position: relative;
  }
  body.slide-layout .diagram-canvas {
    min-height: var(--slide-height);
  }
  .group {
    border: 1px solid var(--neutral-3); border-radius: 4px;
    padding: 28px 12px 12px; background: #E8E4DF; position: relative;
  }
  .group-label {
    position: absolute; top: 8px; left: 12px;
    font-size: 9px; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--bark); font-weight: 700;
  }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 8px; }
  .service-card {
    position: relative; background: #FFFFFF;
    border: 1px solid #C9C3BC;
    box-shadow: 0 1px 4px rgba(49,45,42,0.12), 0 0 0 1px rgba(44,89,103,0.07);
    border-radius: 5px; padding: 10px 12px 10px 15px;
  }
  .service-card::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
    border-radius: 5px 0 0 5px; background: var(--card-accent, var(--ocean));
  }
  .card-header, .service-head { display: flex; align-items: center; gap: 9px; margin-bottom: 4px; }
  .card-icon, .service-icon {
    width: 22px; height: 22px; color: var(--card-accent, var(--ocean));
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 5px; background: rgba(44,89,103,0.15);
    box-shadow: inset 0 0 0 1px rgba(44,89,103,0.25); flex-shrink: 0; font-size: 13px;
  }
  .card-icon img, .service-icon img { width: 15px; height: 15px; }
  .chip-ocean  { background: rgba(44,89,103,0.15);   box-shadow: inset 0 0 0 1px rgba(44,89,103,0.25);   color: #2C5967; }
  .chip-sienna { background: rgba(174,86,44,0.13);   box-shadow: inset 0 0 0 1px rgba(174,86,44,0.22);   color: #AE562C; }
  .chip-red    { background: rgba(199,70,52,0.12);   box-shadow: inset 0 0 0 1px rgba(199,70,52,0.20);   color: #C74634; }
  .chip-ivy    { background: rgba(117,156,108,0.13); box-shadow: inset 0 0 0 1px rgba(117,156,108,0.22); color: #759C6C; }
  .chip-bark   { background: rgba(49,45,42,0.10);    box-shadow: inset 0 0 0 1px rgba(49,45,42,0.18);    color: #312D2A; }
  .chip-vivid-teal   { background: rgba(15,135,153,0.13); box-shadow: inset 0 0 0 1px rgba(15,135,153,0.25); color: #0F8799; }
  .chip-vivid-orange { background: rgba(224,101,32,0.13); box-shadow: inset 0 0 0 1px rgba(224,101,32,0.25); color: #E06520; }
  .chip-vivid-cobalt { background: rgba(30,93,171,0.13);  box-shadow: inset 0 0 0 1px rgba(30,93,171,0.25);  color: #1E5DAB; }
  .chip-vivid-forest { background: rgba(46,140,70,0.13);  box-shadow: inset 0 0 0 1px rgba(46,140,70,0.25);  color: #2E8C46; }
  .chip-vivid-grape  { background: rgba(123,79,160,0.13); box-shadow: inset 0 0 0 1px rgba(123,79,160,0.25); color: #7B4FA0; }
  .card-title { font-size: 13px; font-weight: 700; color: var(--card-accent, var(--ocean)); line-height: 1.3; }
  .card-items { list-style: none; margin: 0; padding: 0; }
  .card-items li { font-size: 10px; line-height: 1.6; }
  .db-node {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    background: #FFFFFF; border: 1.5px solid var(--neutral-2); border-radius: 8px;
    padding: 10px 14px; text-align: center; min-width: 120px;
  }
  .db-node-icon {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--db-color, var(--ocean));
    display: flex; align-items: center; justify-content: center;
    color: #FFFFFF; font-size: 15px;
  }
  .db-node-icon img { width: 18px; height: 18px; object-fit: contain; filter: brightness(0) invert(1); }
  .db-node-name { font-size: 10px; font-weight: 700; color: var(--bark); line-height: 1.3; }
  .db-node-type { font-size: 8.5px; color: var(--neutral-4); line-height: 1.3; }

  /* ── Edit mode ── */
  body.edit-mode [contenteditable="true"] {
    outline: 1px dashed var(--sienna);
    outline-offset: 2px;
    background: rgba(174,86,44,0.05);
    border-radius: 2px;
  }
  /* Nav title becomes editable — styled for dark nav background */
  body.edit-mode #diagTitle[contenteditable="true"] {
    outline: 1px dashed rgba(199,70,52,0.7);
    background: rgba(199,70,52,0.12);
    border-radius: 3px;
    padding: 1px 5px;
    cursor: text;
    max-width: 400px;
  }

  /* ── Review layer ── */
  .review-layer {
    position: absolute; inset: 0; z-index: 20;
    pointer-events: none; overflow: hidden;
  }
  .review-connectors {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none; overflow: visible; z-index: 1;
  }
  .review-markup {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none; overflow: visible; z-index: 1;
  }
  .review-mark {
    fill: none; stroke: #C74634; stroke-width: 3;
    vector-effect: non-scaling-stroke;
    stroke-linecap: round; stroke-linejoin: round;
    pointer-events: visiblePainted; cursor: grab;
  }
  .review-mark.dragging { cursor: grabbing; }
  .review-mark.selected {
    filter: drop-shadow(0 0 0.7px rgba(255,255,255,0.98)) drop-shadow(0 0 4px rgba(49,45,42,0.32));
  }
  .review-connector { stroke: #6F6861; stroke-width: 1.2; stroke-dasharray: 5 3; fill: none; }
  .review-target { fill: rgba(174,86,44,0.15); stroke: #AE562C; stroke-width: 1; stroke-dasharray: 3 2; }
  .review-note {
    position: absolute; width: 230px; min-width: 160px; min-height: 94px;
    background: rgba(255,245,176,0.88);
    border: 1px solid rgba(157,123,42,0.58);
    border-radius: 8px; box-shadow: 0 3px 10px rgba(49,45,42,0.16);
    backdrop-filter: blur(1.5px);
    display: flex; flex-direction: column; z-index: 2; pointer-events: auto;
    resize: both; overflow: hidden;
  }
  .review-note-head {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px 4px;
    border-bottom: 1px dashed rgba(90,72,28,0.35);
    cursor: move; user-select: none;
  }
  .review-note-title {
    font-size: 10px; font-weight: 700; color: #5A4720;
    letter-spacing: 0.05em; text-transform: uppercase; flex: 1;
  }
  .review-note-delete {
    border: 1px solid rgba(90,72,28,0.4); background: rgba(255,255,255,0.46);
    color: #5A4720; border-radius: 4px; width: 22px; height: 22px;
    cursor: pointer; font-size: 11px; line-height: 1; padding: 0;
  }
  .review-note-text {
    border: 0; background: transparent; color: #4A3A1E;
    font-size: 11px; line-height: 1.45; padding: 8px;
    min-height: 50px; width: 100%; resize: none; flex: 1;
    outline: none; font-family: inherit;
  }
  .review-anchor {
    position: absolute; width: 12px; height: 12px;
    transform: translate(-50%,-50%);
    border-radius: 50%; border: 1.5px solid #AE562C;
    background: rgba(174,86,44,0.20);
    box-shadow: 0 0 0 2px rgba(255,255,255,0.68);
    cursor: grab; z-index: 3; pointer-events: auto;
  }
  .review-anchor::before {
    content: ""; position: absolute; inset: -7px;
    border: 1px dashed rgba(174,86,44,0.5); border-radius: 50%;
  }
  .review-anchor.dragging { cursor: grabbing; }
  body.review-annotate-mode .review-layer { pointer-events: auto; cursor: crosshair; }
  body.review-annotate-mode .review-markup { pointer-events: auto; }

  /* ── Edit toolbar ── */
  .edit-toolbar {
    position: fixed; right: 16px; bottom: 16px; z-index: 9999;
    display: flex; gap: 6px; align-items: center;
    background: rgba(20,40,48,0.96);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; padding: 7px 10px;
    flex-wrap: wrap; max-width: min(90vw, 900px);
  }
  .edit-toolbar button {
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08); color: #FFFFFF;
    border-radius: 6px; font-size: 11px; padding: 5px 9px;
    cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  .edit-toolbar button:hover { background: rgba(255,255,255,0.16); }
  .edit-toolbar button.active { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.20); }
  .review-tools {
    display: none; align-items: center; gap: 5px;
    padding-left: 8px; margin-left: 2px;
    border-left: 1px solid rgba(255,255,255,0.2);
  }
  body.review-annotate-mode .review-tools { display: flex; }
  .tool-palette { display: flex; align-items: center; gap: 3px; }
  .tool-btn {
    width: 26px; height: 26px; padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 5px; border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.08); color: #E5EFF3; cursor: pointer;
  }
  .tool-btn i { font-size: 11px; pointer-events: none; }
  .tool-btn:hover { background: rgba(255,255,255,0.16); }
  .tool-btn.active {
    border-color: rgba(199,70,52,0.72); background: rgba(199,70,52,0.24); color: #fff;
  }
  .review-control-label { color: #D3E7EF; font-size: 10px; }
  .edit-toolbar select,
  .edit-toolbar input[type="color"],
  .edit-toolbar input[type="range"] {
    border: 1px solid rgba(255,255,255,0.26); background: rgba(255,255,255,0.10);
    color: #FFFFFF; border-radius: 5px; font-size: 11px; height: 26px; padding: 0 5px;
  }
  .edit-toolbar input[type="color"] { width: 32px; min-width: 32px; padding: 2px; cursor: pointer; }
  .edit-toolbar input[type="range"] { width: 64px; padding: 0; }
  .edit-toolbar select option { color: #1B1B1B; background: #fff; }
  .edit-status { color: #D3E7EF; font-size: 10px; padding: 0 3px; align-self: center; }

  @media (max-width: 960px) { .cards { grid-template-columns: 1fr; } }
</style>
</head>

<!-- Drop zone -->
<div id="dropZone">
  <div class="drop-icon"><i class="fa-solid fa-diagram-project"></i></div>
  <h2 class="drop-title">OCI Architecture Viewer</h2>
  <p class="drop-sub">Drop a lean diagram HTML file here, or click Open to browse</p>
  <button class="drop-btn" id="dropOpenBtn" type="button">
    <i class="fa-solid fa-folder-open"></i>&ensp;Open Diagram&hellip;
  </button>
  <input type="file" id="fileInput" accept=".html,.htm">
</div>

<!-- Diagram mount -->
<div id="diagramMount"></div>

<!-- Edit toolbar (hidden until diagram loaded) -->
<div class="edit-toolbar" id="editToolbar" style="display:none">
  <button id="toggleEdit" type="button">Enable Edit</button>
  <button id="toggleAnnotate" type="button">Annotate</button>
  <div id="reviewTools" class="review-tools">
    <div class="tool-palette">
      <button class="tool-btn active" data-review-tool="note" title="Sticky note"><i class="fa-solid fa-note-sticky"></i></button>
      <button class="tool-btn" data-review-tool="rect" title="Rectangle"><i class="fa-solid fa-square"></i></button>
      <button class="tool-btn" data-review-tool="ellipse" title="Oval"><i class="fa-solid fa-circle"></i></button>
      <button class="tool-btn" data-review-tool="pen" title="Pen"><i class="fa-solid fa-pen"></i></button>
    </div>
    <label class="review-control-label" for="reviewLineStyle">Style</label>
    <select id="reviewLineStyle"><option value="solid">Solid</option><option value="dashed">Dashed</option><option value="dotted">Dotted</option></select>
    <label class="review-control-label" for="reviewColor">Color</label>
    <input id="reviewColor" type="color" value="#C74634">
    <label class="review-control-label" for="reviewWidth">Width</label>
    <input id="reviewWidth" type="range" min="1" max="8" step="1" value="3">
    <button id="deleteMark" type="button" disabled>Delete Mark</button>
  </div>
  <button id="exportPng" type="button">Export PNG</button>
  <button id="exportDrawio" type="button">Export draw.io</button>
  <button id="exportMermaid" type="button">Export Mermaid</button>
  <button id="saveHtml" type="button">Save HTML</button>
  <span class="edit-status" id="editStatus">View mode</span>
</div>

<script>
(function () {
  "use strict";

  /* ── State ── */
  var loadedFileName = "";
  var loadedTitle = "";
  var loadedSub = "";
  var loadedFooterHtml = "";
  var diagramCss = "";
  var storedFileHandle = null;
  var dirHandle = null;
  var editMode = false;
  var slideLayout = false;  // DEFAULT OFF — user clicks Slide Layout to enable
  var annotateMode = false;
  var reviewCounter = 0;
  var reviewMarkCounter = 0;
  var dragState = null;
  var drawState = null;
  var selectedMark = null;
  var reviewNotes = new Map();
  var reviewStyle = { tool: "note", lineStyle: "solid", color: "#C74634", width: 3 };
  var SVG_NS = "http://www.w3.org/2000/svg";
  var SLIDE_W = 1366, SLIDE_H = 768;
  var verBase = "", verN = 0, verExt = "";

  /* ── DOM refs (static) ── */
  var dropZone        = document.getElementById("dropZone");
  var diagramMount    = document.getElementById("diagramMount");
  var editToolbar     = document.getElementById("editToolbar");
  var openFileBtnNav  = document.getElementById("openFileBtn");
  var dropOpenBtn     = document.getElementById("dropOpenBtn");
  var fileInput       = document.getElementById("fileInput");
  var diagInfo        = document.getElementById("diagInfo");
  var diagTitleEl     = document.getElementById("diagTitle");
  var fileChipEl      = document.getElementById("fileChip");
  var verNavInline    = document.getElementById("verNavInline");
  var verPrevBtn      = document.getElementById("verPrev");
  var verNextBtn      = document.getElementById("verNext");
  var verLabelEl      = document.getElementById("verLabel");
  var toggleEditBtn   = document.getElementById("toggleEdit");
  var annotateBtn     = document.getElementById("toggleAnnotate");
  var reviewToolBtns  = Array.from(document.querySelectorAll("[data-review-tool]"));
  var reviewLineStyle = document.getElementById("reviewLineStyle");
  var reviewColorIn   = document.getElementById("reviewColor");
  var reviewWidthIn   = document.getElementById("reviewWidth");
  var deleteMarkBtn   = document.getElementById("deleteMark");
  var exportPngBtn    = document.getElementById("exportPng");
  var exportDrawioBtn  = document.getElementById("exportDrawio");
  var exportMermaidBtn = document.getElementById("exportMermaid");
  var saveHtmlBtn      = document.getElementById("saveHtml");
  var slideBtn           = document.getElementById("toggleSlideLayout");
  var toolbarToggleNav   = document.getElementById("toggleToolbarNav");
  var editStatusEl       = document.getElementById("editStatus");

  /* ── Dynamic DOM refs (set after inject) ── */
  var reviewLayerEl, reviewConnectorsEl, reviewMarkupEl, diagramCanvasEl;

  /* ── File open ── */
  function triggerFileOpen() {
    if (window.showOpenFilePicker) {
      window.showOpenFilePicker({
        types: [{ description: "HTML Diagrams", accept: { "text/html": [".html", ".htm"] } }]
      }).then(function (handles) {
        storedFileHandle = handles[0];
        loadedFileName = storedFileHandle.name;
        return storedFileHandle.getFile().then(function (f) { return f.text(); });
      }).then(function (text) {
        loadFileText(text);
      }).catch(function () {});
    } else {
      fileInput.click();
    }
  }

  fileInput.addEventListener("change", function () {
    var file = fileInput.files && fileInput.files[0];
    if (!file) return;
    loadedFileName = file.name;
    storedFileHandle = null;
    dirHandle = null;
    file.text().then(loadFileText);
  });

  openFileBtnNav.addEventListener("click", triggerFileOpen);
  dropOpenBtn.addEventListener("click", triggerFileOpen);

  /* ── Drag & drop ── */
  document.addEventListener("dragover", function (e) { e.preventDefault(); dropZone.classList.add("drag-over"); });
  document.addEventListener("dragleave", function (e) { if (!e.relatedTarget) dropZone.classList.remove("drag-over"); });
  document.addEventListener("drop", function (e) {
    e.preventDefault();
    dropZone.classList.remove("drag-over");
    var file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (!file || !file.name.match(/\.html?$/i)) return;
    loadedFileName = file.name;
    storedFileHandle = null;
    dirHandle = null;
    file.text().then(loadFileText);
  });

  /* ── URL ?file= param ── */
  (function () {
    var p = new URLSearchParams(window.location.search).get("file");
    if (!p) return;
    loadedFileName = p.split("/").pop();
    fetch(p).then(function (r) {
      if (!r.ok) throw new Error("not found");
      return r.text();
    }).then(loadFileText).catch(function () {});
  })();

  /* ── Parse & inject diagram ── */
  function loadFileText(text) {
    injectDiagram(text);
  }

  function injectDiagram(text) {
    /* Extract diagram-specific CSS */
    var cssMatch = text.match(/\/\*\s*DIAGRAM-CSS-START\s*\*\/([\s\S]*?)\/\*\s*DIAGRAM-CSS-END\s*\*\//);
    diagramCss = cssMatch ? cssMatch[1].trim() : "";

    /* Extract canvas content */
    var canvasMatch = text.match(/<main[^>]*id="diagramCanvas"[^>]*>([\s\S]*?)<\/main>/i);
    var canvasHtml = canvasMatch ? canvasMatch[1] : "<p style='padding:20px'>No canvas content found.</p>";
    /* Strip reviewLayer from canvas if present (we inject our own) */
    canvasHtml = canvasHtml.replace(/<div[^>]*id="reviewLayer"[\s\S]*?<\/div>\s*/i, "");

    /* Extract metadata */
    var titleMatch = text.match(/<h1[^>]*class="diagram-title"[^>]*>([\s\S]*?)<\/h1>/i);
    var subMatch   = text.match(/<p[^>]*class="diagram-sub"[^>]*>([\s\S]*?)<\/p>/i);
    var footerMatch= text.match(/<footer[^>]*class="diagram-footer"[^>]*>([\s\S]*?)<\/footer>/i);
    loadedTitle    = titleMatch ? titleMatch[1].replace(/<[^>]+>/g, "").trim() : loadedFileName;
    loadedSub      = subMatch   ? subMatch[1].replace(/<[^>]+>/g, "").trim() : "";
    loadedFooterHtml = footerMatch ? footerMatch[1] : "";

    /* Build injected HTML — canvas only, no inner nav/header */
    var styleTag = diagramCss ? '<style id="diagramInjectedCss">' + diagramCss + "</style>" : "";
    diagramMount.innerHTML =
      styleTag +
      '<div id="slideViewport" class="slide-viewport">' +
        '<div id="slideFrame" class="slide-frame">' +
          '<div id="diagramShell" class="diagram-shell">' +
            '<main class="diagram-canvas" id="diagramCanvas">' +
              '<div id="reviewLayer" class="review-layer">' +
                '<svg id="reviewConnectors" class="review-connectors" aria-hidden="true"></svg>' +
                '<svg id="reviewMarkup" class="review-markup"></svg>' +
              '</div>' +
              canvasHtml +
            '</main>' +
          '</div>' +
        '</div>' +
      '</div>';

    /* Wire dynamic refs */
    reviewLayerEl      = document.getElementById("reviewLayer");
    reviewConnectorsEl = document.getElementById("reviewConnectors");
    reviewMarkupEl     = document.getElementById("reviewMarkup");
    diagramCanvasEl    = document.getElementById("diagramCanvas");
    wireAnnotateCanvas();

    /* Show diagram, hide drop zone */
    dropZone.style.display = "none";
    diagramMount.style.display = "block";
    editToolbar.style.display = "flex";
    slideBtn.style.display = "inline-flex";
    toolbarToggleNav.style.display = "inline-flex";
    toolbarToggleNav.textContent = "Tools";
    toolbarToggleNav.classList.remove("active");

    /* Update viewer nav */
    diagTitleEl.textContent = loadedTitle;
    fileChipEl.textContent  = loadedFileName;
    diagInfo.style.display  = "flex";
    fileChipEl.style.display = "inline-flex";
    document.title = loadedTitle + " — OCI Viewer";

    /* Reset toolbar state */
    editMode = false;
    annotateMode = false;
    document.body.classList.remove("edit-mode", "review-annotate-mode");
    toggleEditBtn.textContent = "Enable Edit";
    annotateBtn.textContent = "Annotate";
    editStatusEl.textContent = "View mode";
    reviewNotes.clear();
    reviewCounter = reviewMarkCounter = 0;
    selectedMark = null;
    dragState = drawState = null;

    /* Default: full mode (slide layout OFF — user can enable manually) */
    slideLayout = false;
    document.body.classList.remove("slide-layout");
    slideBtn.classList.remove("active");
    resetSlideScale();

    /* Version nav */
    setupVersionNav();
  }

  /* ── Slide layout ── */
  slideBtn.addEventListener("click", function () {
    slideLayout = !slideLayout;
    document.body.classList.toggle("slide-layout", slideLayout);
    slideBtn.classList.toggle("active", slideLayout);
    editStatusEl.textContent = slideLayout ? "Slide mode" : (editMode ? "Edit mode" : "View mode");
    if (slideLayout) applySlideScale();
    else resetSlideScale();
  });

  /* Extra vertical reserve so toolbar + breathing room don't clip the diagram */
  var TOOLBAR_RESERVE = 68;

  function applySlideScale() {
    var sv = document.getElementById("slideViewport");
    var ds = document.getElementById("diagramShell");
    var sf = document.getElementById("slideFrame");
    if (!sv || !ds) return;
    var r = sv.getBoundingClientRect();
    var availW = r.width  - 24;
    var availH = r.height - 24 - TOOLBAR_RESERVE;
    var scale = Math.max(0.35, Math.min(1, Math.min(availW / SLIDE_W, availH / SLIDE_H)));
    ds.style.transform = "scale(" + scale + ")";
    if (sf) {
      sf.style.width  = (SLIDE_W * scale) + "px";
      sf.style.height = (SLIDE_H * scale) + "px";
    }
  }

  function resetSlideScale() {
    var ds = document.getElementById("diagramShell");
    var sf = document.getElementById("slideFrame");
    if (ds) ds.style.transform = "";
    if (sf) { sf.style.width = ""; sf.style.height = ""; }
  }

  window.addEventListener("resize", function () { if (slideLayout) applySlideScale(); });

  /* ── Version navigation ── */
  function setupVersionNav() {
    var m = loadedFileName.match(/^(.+?)-v(\d+)(\.html?)$/i);
    if (!m) { verNavInline.style.display = "none"; return; }
    verBase = m[1]; verN = parseInt(m[2], 10); verExt = m[3];
    verLabelEl.textContent = "v" + verN;
    verPrevBtn.disabled = (verN <= 1);
    verNextBtn.disabled = false;
    verNavInline.style.display = "flex";
  }

  verPrevBtn.addEventListener("click", function () { loadVersion(verN - 1); });
  verNextBtn.addEventListener("click", function () { loadVersion(verN + 1); });

  function loadVersion(n) {
    if (n < 1) return;
    var name = verBase + "-v" + n + verExt;

    /* Already have folder permission — try directly */
    if (dirHandle) {
      loadFromDir(dirHandle, name);
      return;
    }

    /* No folder permission yet — request it once via directory picker.
       Once granted, subsequent prev/next clicks go straight to loadFromDir. */
    if (!window.showDirectoryPicker) {
      showToast("Folder access not supported in this browser. Use Open Diagram to load " + name + ".");
      return;
    }
    var startIn = storedFileHandle || "documents";
    showToast("Select the folder containing your diagrams to enable navigation…", 5000);
    window.showDirectoryPicker({ startIn: startIn })
      .then(function (dh) {
        dirHandle = dh;
        loadFromDir(dh, name);
      })
      .catch(function () {
        /* User cancelled picker — do nothing */
      });
  }

  function loadFromDir(dh, name) {
    dh.getFileHandle(name)
      .then(function (h) { return h.getFile(); })
      .then(function (f) {
        loadedFileName = name;
        return f.text();
      })
      .then(function (text) {
        injectDiagram(text);
      })
      .catch(function () {
        /* File doesn't exist yet — friendly toast, no extra dialogs */
        showToast(name + " not found in folder (may not exist yet).");
      });
  }

  /* ── Toast notification ── */
  function showToast(msg, duration) {
    var el = document.createElement("div");
    el.style.cssText = [
      "position:fixed", "top:54px", "left:50%", "transform:translateX(-50%)",
      "background:rgba(20,40,48,0.94)", "color:#fff",
      "padding:9px 18px", "border-radius:7px",
      "font-size:12px", "z-index:99999",
      "pointer-events:none", "white-space:nowrap",
      "border:1px solid rgba(255,255,255,0.14)",
      "box-shadow:0 3px 12px rgba(0,0,0,.25)"
    ].join(";");
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function () { el.remove(); }, duration || 3000);
  }

  /* ── Toolbar toggle (nav bar button) ── */
  function toggleToolbarVisibility() {
    var willHide = editToolbar.style.display !== "none";
    editToolbar.style.display = willHide ? "none" : "flex";
    toolbarToggleNav.textContent = willHide ? "Show Tools" : "Tools";
    toolbarToggleNav.classList.toggle("active", willHide); /* highlight when toolbar is hidden */
  }
  toolbarToggleNav.addEventListener("click", toggleToolbarVisibility);

  /* ── Edit mode ── */
  var editableSelector = [
    "[data-editable='true']",
    ".diagram-title", ".diagram-sub", ".group-label", ".card-title", ".card-items li",
    ".review-note-title",
    /* VAM / diagram-specific classes */
    ".vam-card-title", ".layer-label", ".boundary-label",
    ".ext-box-title", ".ext-item", ".obrh-title",
    ".db-node-name", ".db-node-type",
    ".ext-section-label", ".legend-item",
    ".deploy-stack-label", ".deploy-tag",
    ".swimlane-label", ".section-label"
  ].join(", ");

  toggleEditBtn.addEventListener("click", function () {
    editMode = !editMode;
    document.body.classList.toggle("edit-mode", editMode);
    setEditable(editMode);
    toggleEditBtn.textContent = editMode ? "Disable Edit" : "Enable Edit";
    toggleEditBtn.classList.toggle("active", editMode);
    editStatusEl.textContent = editMode ? "Edit mode" : (slideLayout ? "Slide mode" : "View mode");
  });

  function setEditable(on) {
    document.querySelectorAll(editableSelector).forEach(function (el) {
      el.setAttribute("contenteditable", on ? "true" : "false");
      el.setAttribute("spellcheck", "false");
    });
    /* Nav bar title is also editable in edit mode */
    if (diagTitleEl) {
      diagTitleEl.setAttribute("contenteditable", on ? "true" : "false");
      diagTitleEl.setAttribute("spellcheck", "false");
    }
  }

  /* ── Review / Annotate ── */
  annotateBtn.addEventListener("click", function () {
    annotateMode = !annotateMode;
    document.body.classList.toggle("review-annotate-mode", annotateMode);
    annotateBtn.textContent = annotateMode ? "Stop Annotate" : "Annotate";
    annotateBtn.classList.toggle("active", annotateMode);
    editStatusEl.textContent = annotateMode ? "Annotate mode" : (editMode ? "Edit mode" : (slideLayout ? "Slide mode" : "View mode"));
  });

  reviewToolBtns.forEach(function (btn) {
    btn.addEventListener("click", function () {
      reviewStyle.tool = btn.dataset.reviewTool;
      reviewToolBtns.forEach(function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
    });
  });
  reviewLineStyle.addEventListener("change", function () { reviewStyle.lineStyle = reviewLineStyle.value; });
  reviewColorIn.addEventListener("input",  function () { reviewStyle.color = reviewColorIn.value; });
  reviewWidthIn.addEventListener("input",  function () { reviewStyle.width = parseInt(reviewWidthIn.value, 10); });

  deleteMarkBtn.addEventListener("click", function () {
    if (!selectedMark) return;
    var id = selectedMark.dataset.markId;
    selectedMark.remove();
    var note = reviewNotes.get(id);
    if (note) { note.noteEl.remove(); note.anchorEl.remove(); reviewNotes.delete(id); }
    var conn = reviewConnectorsEl && reviewConnectorsEl.querySelector("[data-conn-id='" + id + "']");
    if (conn) conn.remove();
    selectedMark = null;
    deleteMarkBtn.disabled = true;
  });

  function wireAnnotateCanvas() {
    if (!reviewMarkupEl) return;
    reviewMarkupEl.addEventListener("mousedown", onMarkupMousedown);
  }

  /* Return CSS scale of the diagram shell (1 when not in slide mode) */
  function getDrawScale() {
    var ds = document.getElementById("diagramShell");
    if (!ds || !slideLayout) return 1;
    var m = ds.style.transform && ds.style.transform.match(/scale\(([\d.]+)\)/);
    return m ? parseFloat(m[1]) : 1;
  }

  function onMarkupMousedown(e) {
    if (!annotateMode || !reviewMarkupEl) return;
    var rect = reviewMarkupEl.getBoundingClientRect();
    var sc = getDrawScale();
    var x = (e.clientX - rect.left) / sc, y = (e.clientY - rect.top) / sc;
    var tool = reviewStyle.tool;
    if (tool === "note") { addNote(x, y); return; }
    var id = "m" + (++reviewMarkCounter);
    var el;
    if (tool === "pen") {
      el = document.createElementNS(SVG_NS, "polyline");
      el.setAttribute("points", x + "," + y);
    } else {
      el = document.createElementNS(SVG_NS, tool === "rect" ? "rect" : "ellipse");
      el.classList.add("review-target");
      el.setAttribute("fill", hexRgba(reviewStyle.color, 0.08));
      if (tool === "rect") { el.setAttribute("x", x); el.setAttribute("y", y); el.setAttribute("width", 0); el.setAttribute("height", 0); }
      else { el.setAttribute("cx", x); el.setAttribute("cy", y); el.setAttribute("rx", 0); el.setAttribute("ry", 0); }
    }
    el.classList.add("review-mark");
    el.dataset.markId = id;
    el.setAttribute("stroke", reviewStyle.color);
    el.setAttribute("stroke-width", reviewStyle.width);
    el.setAttribute("stroke-dasharray", dashArr(reviewStyle.lineStyle, reviewStyle.width));
    reviewMarkupEl.appendChild(el);
    drawState = { id: id, el: el, tool: tool, startX: x, startY: y };
  }

  document.addEventListener("mousemove", function (e) {
    if (drawState && reviewMarkupEl) {
      var rect = reviewMarkupEl.getBoundingClientRect();
      var sc = getDrawScale();
      var x = (e.clientX - rect.left) / sc, y = (e.clientY - rect.top) / sc;
      var ds = drawState;
      if (ds.tool === "pen") {
        ds.el.setAttribute("points", (ds.el.getAttribute("points") || "") + " " + x + "," + y);
      } else if (ds.tool === "rect") {
        var minX = Math.min(x, ds.startX), minY = Math.min(y, ds.startY);
        ds.el.setAttribute("x", minX); ds.el.setAttribute("y", minY);
        ds.el.setAttribute("width", Math.abs(x - ds.startX));
        ds.el.setAttribute("height", Math.abs(y - ds.startY));
      } else {
        ds.el.setAttribute("cx", (x + ds.startX) / 2); ds.el.setAttribute("cy", (y + ds.startY) / 2);
        ds.el.setAttribute("rx", Math.abs(x - ds.startX) / 2); ds.el.setAttribute("ry", Math.abs(y - ds.startY) / 2);
      }
    }
    if (dragState) {
      /* Note/anchor drag: divide screen delta by scale to get diagram coords */
      var sc2 = getDrawScale();
      var dx = (e.clientX - dragState.sx) / sc2, dy = (e.clientY - dragState.sy) / sc2;
      var nx = dragState.ol + dx, ny = dragState.ot + dy;
      dragState.el.style.left = nx + "px";
      dragState.el.style.top  = ny + "px";
      if (dragState.cb) dragState.cb(nx, ny);
    }
  });

  document.addEventListener("mouseup", function () {
    if (drawState) {
      makeSvgMarkDraggable(drawState.el); /* also handles selection on click */
      drawState = null;
    }
    dragState = null;
  });

  /* Make a completed SVG mark selectable and draggable */
  function makeSvgMarkDraggable(el) {
    el.addEventListener("mousedown", function (e) {
      if (e.button !== 0) return;
      e.stopPropagation(); /* don't trigger canvas draw handler */
      selectMark(el);
      var startX = e.clientX, startY = e.clientY;
      function onMove(e2) {
        var sc = getDrawScale();
        var dx = (e2.clientX - startX) / sc, dy = (e2.clientY - startY) / sc;
        startX = e2.clientX; startY = e2.clientY;
        moveSvgMark(el, dx, dy);
      }
      function onUp() {
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  }

  function moveSvgMark(el, dx, dy) {
    var tag = el.tagName.toLowerCase();
    if (tag === "rect") {
      el.setAttribute("x", (parseFloat(el.getAttribute("x")) || 0) + dx);
      el.setAttribute("y", (parseFloat(el.getAttribute("y")) || 0) + dy);
    } else if (tag === "ellipse") {
      el.setAttribute("cx", (parseFloat(el.getAttribute("cx")) || 0) + dx);
      el.setAttribute("cy", (parseFloat(el.getAttribute("cy")) || 0) + dy);
    } else if (tag === "polyline") {
      var pts = (el.getAttribute("points") || "").trim().split(/\s+/);
      var moved = pts.map(function (p) {
        var c = p.split(",");
        return ((parseFloat(c[0]) || 0) + dx) + "," + ((parseFloat(c[1]) || 0) + dy);
      });
      el.setAttribute("points", moved.join(" "));
    }
  }

  function selectMark(el) {
    if (selectedMark) selectedMark.classList.remove("selected");
    selectedMark = el;
    el.classList.add("selected");
    deleteMarkBtn.disabled = false;
  }

  function addNote(x, y) {
    if (!reviewLayerEl) return;
    var id = "n" + (++reviewCounter);
    var noteEl = document.createElement("div");
    noteEl.className = "review-note";
    noteEl.dataset.noteId = id;
    noteEl.style.left = (x + 10) + "px";
    noteEl.style.top  = (y + 10) + "px";
    noteEl.innerHTML =
      '<div class="review-note-head">' +
        '<span class="review-note-title">Note ' + reviewCounter + '</span>' +
        '<button class="review-note-delete" type="button">&times;</button>' +
      '</div>' +
      '<textarea class="review-note-text" placeholder="Type note here\u2026"></textarea>';
    reviewLayerEl.appendChild(noteEl);

    var anchorEl = document.createElement("div");
    anchorEl.className = "review-anchor";
    anchorEl.style.left = x + "px"; anchorEl.style.top = y + "px";
    reviewLayerEl.appendChild(anchorEl);

    reviewNotes.set(id, { noteEl: noteEl, anchorEl: anchorEl, x: x, y: y });
    updateConnector(id, x, y, x + 20, y + 20);

    noteEl.querySelector(".review-note-delete").addEventListener("click", function () {
      noteEl.remove(); anchorEl.remove();
      var conn = reviewConnectorsEl && reviewConnectorsEl.querySelector("[data-conn-id='" + id + "']");
      if (conn) conn.remove();
      reviewNotes.delete(id);
    });

    makeDraggable(noteEl, function (nx, ny) {
      var d = reviewNotes.get(id);
      if (d) updateConnector(id, d.x, d.y, nx + 10, ny + 10);
    });
    makeDraggable(anchorEl, function (nx, ny) {
      var d = reviewNotes.get(id);
      if (d) { d.x = nx; d.y = ny; updateConnector(id, nx, ny, parseFloat(noteEl.style.left) + 10, parseFloat(noteEl.style.top) + 10); }
    });
  }

  function updateConnector(id, ax, ay, nx, ny) {
    if (!reviewConnectorsEl) return;
    var ex = reviewConnectorsEl.querySelector("[data-conn-id='" + id + "']");
    if (ex) ex.remove();
    var line = document.createElementNS(SVG_NS, "line");
    line.setAttribute("x1", ax); line.setAttribute("y1", ay);
    line.setAttribute("x2", nx); line.setAttribute("y2", ny);
    line.classList.add("review-connector");
    line.dataset.connId = id;
    reviewConnectorsEl.appendChild(line);
  }

  function makeDraggable(el, onMove) {
    el.addEventListener("mousedown", function (e) {
      if (e.button !== 0) return;
      e.stopPropagation();
      dragState = {
        el: el, sx: e.clientX, sy: e.clientY,
        ol: parseFloat(el.style.left) || 0,
        ot: parseFloat(el.style.top)  || 0,
        cb: onMove
      };
    });
  }

  /* ── Export PNG ── */
  exportPngBtn.addEventListener("click", function () {
    var target = document.getElementById("diagramShell") || diagramMount;
    if (!target || typeof html2canvas === "undefined") { alert("html2canvas not available."); return; }
    /* Temporarily disable slide transform for full-res capture */
    var ds = document.getElementById("diagramShell");
    var savedTransform = ds ? ds.style.transform : "";
    if (ds) ds.style.transform = "";
    html2canvas(target, { scale: 2, useCORS: true, allowTaint: true }).then(function (canvas) {
      if (ds) ds.style.transform = savedTransform;
      var a = document.createElement("a");
      a.download = loadedFileName.replace(/\.html?$/i, "") + ".png";
      a.href = canvas.toDataURL("image/png");
      a.click();
    }).catch(function () { if (ds) ds.style.transform = savedTransform; });
  });

  /* ── Export draw.io XML ──────────────────────────────────────────────────────
     Deterministic: reads actual rendered positions via getBoundingClientRect(),
     reads resolved colors via getComputedStyle(), maps DOM classes → draw.io shapes.
     No LLM tokens needed.
  ── */
  exportDrawioBtn.addEventListener("click", function () {
    var xml = buildDrawioXml();
    if (!xml) { showToast("No diagram loaded."); return; }
    var blob = new Blob([xml], { type: "application/xml" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = loadedFileName.replace(/\.html?$/i, "") + ".drawio";
    a.click();
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 10000);
  });

  function buildDrawioXml() {
    var canvas = document.getElementById("diagramCanvas");
    var shell  = document.getElementById("diagramShell");
    if (!canvas || !shell) return null;

    /* Account for CSS scale so all coordinates are in diagram px */
    var sc = getDrawScale();
    var shellRect = shell.getBoundingClientRect();

    var idN = 2;
    var cells = [];

    /* ── Helpers ── */
    function toG(el) {
      var r = el.getBoundingClientRect();
      return {
        x: Math.round((r.left - shellRect.left) / sc),
        y: Math.round((r.top  - shellRect.top)  / sc),
        w: Math.round(r.width  / sc),
        h: Math.round(r.height / sc)
      };
    }
    function xe(s) {
      return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    function rgbHex(rgb) {
      var m = (rgb || "").match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
      if (!m) return null;
      return "#" + [m[1],m[2],m[3]].map(function (n) {
        return ("0" + parseInt(n, 10).toString(16)).slice(-2);
      }).join("");
    }
    /* Read the resolved border-left (or border-top) color as hex */
    function borderHex(el) {
      return rgbHex(getComputedStyle(el).borderLeftColor) ||
             rgbHex(getComputedStyle(el).borderTopColor) ||
             "#9E9892";
    }
    /* Strip icon elements (<i>, <img>) before reading text */
    function labelText(el) {
      if (!el) return "";
      var c = el.cloneNode(true);
      c.querySelectorAll("i, img").forEach(function (x) { x.remove(); });
      return c.textContent.replace(/\s+/g, " ").trim();
    }
    function addCell(value, style, g) {
      cells.push(
        '        <mxCell id="' + (idN++) + '" value="' + xe(value) + '" style="' + style + '" vertex="1" parent="1">' +
        '<mxGeometry x="' + g.x + '" y="' + g.y + '" width="' + Math.max(g.w, 20) + '" height="' + Math.max(g.h, 16) + '" as="geometry"/>' +
        '</mxCell>'
      );
    }

    /* ── 1. Dashed group / deployment boundary containers ── */
    canvas.querySelectorAll(".deployment-boundary, .group").forEach(function (el) {
      var g = toG(el);
      var label = labelText(el.querySelector(".boundary-label, .group-label"));
      var color = borderHex(el);
      addCell(label,
        "rounded=1;whiteSpace=wrap;html=1;fillColor=none;strokeColor=" + color + ";strokeWidth=2;dashed=1;" +
        "verticalAlign=top;align=left;fontSize=9;fontStyle=1;fontColor=" + color + ";spacingTop=5;spacingLeft=6;",
        g);
    });

    /* ── 2. Layer swimlane containers ── */
    canvas.querySelectorAll(".vam-layer, .swimlane-row").forEach(function (el) {
      var g = toG(el);
      var label = labelText(el.querySelector(".layer-label, .swimlane-label"));
      addCell(label,
        "swimlane;startSize=22;fillColor=#F5F4F2;strokeColor=#DFDCD8;fontStyle=1;fontSize=9;align=left;" +
        "spacingLeft=5;",
        g);
    });

    /* ── 3. Persistence layer container ── */
    canvas.querySelectorAll(".persistence-layer").forEach(function (el) {
      var g = toG(el);
      var label = labelText(el.querySelector(".persistence-label"));
      addCell(label,
        "rounded=1;whiteSpace=wrap;html=1;fillColor=#FEF8F7;strokeColor=#C74634;strokeWidth=2;dashed=1;" +
        "verticalAlign=top;align=left;fontSize=8;fontStyle=1;fontColor=#9E9892;spacingLeft=6;spacingTop=4;",
        g);
    });

    /* ── 4. Deploy-stack tag cloud container ── */
    canvas.querySelectorAll(".deploy-stack").forEach(function (el) {
      var g = toG(el);
      addCell("",
        "rounded=1;whiteSpace=wrap;html=1;fillColor=#F0FBFD;strokeColor=#0F8799;strokeWidth=1;dashed=0;",
        g);
    });

    /* ── 5. Deploy tags (pills) ── */
    canvas.querySelectorAll(".deploy-tag").forEach(function (el) {
      var g = toG(el);
      if (g.w < 15) return;
      var text = labelText(el);
      var textColor = rgbHex(getComputedStyle(el).color) || "#1E5DAB";
      var bgColor   = rgbHex(getComputedStyle(el).backgroundColor) || "#FFFFFF";
      addCell(text,
        "rounded=1;whiteSpace=wrap;html=1;fillColor=" + bgColor + ";strokeColor=" + textColor + ";" +
        "fontSize=8;fontColor=" + textColor + ";",
        g);
    });

    /* ── 6. VAM cards / service-cards ── */
    canvas.querySelectorAll(".vam-card, .service-card").forEach(function (el) {
      var g = toG(el);
      var titleEl = el.querySelector(".vam-card-title, .card-title");
      var label = titleEl ? titleEl.textContent.trim() : "";
      /* Left-border color = resolved card accent */
      var accent = rgbHex(getComputedStyle(el).borderLeftColor) || "#2C5967";
      addCell(label,
        "rounded=1;whiteSpace=wrap;html=1;fillColor=#FFFFFF;strokeColor=" + accent + ";strokeWidth=3;" +
        "align=left;verticalAlign=middle;fontSize=8;fontStyle=1;fontColor=" + accent + ";spacingLeft=7;",
        g);
    });

    /* ── 7. DB nodes (cylinders) ── */
    canvas.querySelectorAll(".db-node").forEach(function (el) {
      var g = toG(el);
      var name = (el.querySelector(".db-node-name") || { textContent: "" }).textContent.trim();
      var type = (el.querySelector(".db-node-type") || { textContent: "" }).textContent.trim();
      var iconEl = el.querySelector(".db-node-icon");
      var dbColor = iconEl ? (rgbHex(getComputedStyle(iconEl).backgroundColor) || "#C74634") : "#C74634";
      addCell(name + (type ? "\n" + type : ""),
        "shape=cylinder3;whiteSpace=wrap;html=1;boundedLbl=1;backgroundOutline=1;size=10;" +
        "fillColor=#FFFFFF;strokeColor=" + dbColor + ";strokeWidth=2;fontSize=8;fontStyle=1;",
        g);
    });

    /* ── 8. OBRH card ── */
    canvas.querySelectorAll(".obrh-card").forEach(function (el) {
      var g = toG(el);
      var title = (el.querySelector(".obrh-title") || { textContent: "" }).textContent.trim();
      var subEl = el.querySelector("div:not(.obrh-icon):not(.obrh-title):not(.obrh-arrows)");
      var sub = subEl ? subEl.textContent.trim() : "";
      addCell(title + (sub ? "\n" + sub : ""),
        "rounded=1;whiteSpace=wrap;html=1;fillColor=#FFFFFF;strokeColor=#0F8799;strokeWidth=2;" +
        "fontStyle=1;fontSize=9;fontColor=#0F8799;",
        g);
    });

    /* ── 9. External boxes ── */
    canvas.querySelectorAll(".ext-box").forEach(function (el) {
      var g = toG(el);
      var title = labelText(el.querySelector(".ext-box-title"));
      var items = Array.from(el.querySelectorAll(".ext-item"))
        .map(function (i) { return "\u2022 " + labelText(i); })
        .join("\n");
      addCell(title + (items ? "\n" + items : ""),
        "rounded=1;whiteSpace=wrap;html=1;fillColor=#FFFFFF;strokeColor=#DFDCD8;strokeWidth=2;" +
        "align=left;verticalAlign=top;spacingLeft=8;spacingTop=6;fontSize=8;",
        g);
    });

    /* ── 10. External section labels (plain text) ── */
    canvas.querySelectorAll(".ext-section-label").forEach(function (el) {
      var g = toG(el);
      addCell(el.textContent.trim(),
        "text;html=1;strokeColor=none;fillColor=none;align=left;verticalAlign=middle;" +
        "fontSize=8;fontStyle=1;fontColor=#9E9892;",
        g);
    });

    /* ── 11. Legend ── */
    canvas.querySelectorAll(".vam-legend").forEach(function (el) {
      var g = toG(el);
      var text = Array.from(el.querySelectorAll(".legend-item"))
        .map(function (i) { return labelText(i); }).join("  |  ");
      addCell(text,
        "text;html=1;strokeColor=none;fillColor=none;align=left;verticalAlign=middle;" +
        "fontSize=8;fontColor=#9E9892;",
        g);
    });

    /* ── Wrap in mxGraphModel ── */
    return '<?xml version="1.0" encoding="UTF-8"?>\n' +
      '<mxfile>\n' +
      '  <diagram name="' + xe(loadedTitle || "Architecture") + '">\n' +
      '    <mxGraphModel dx="1600" dy="900" grid="0" gridSize="10" guides="1" tooltips="1"' +
      ' connect="1" arrows="1" fold="1" page="0" pageScale="1"' +
      ' pageWidth="1366" pageHeight="768" math="0" shadow="1">\n' +
      '      <root>\n' +
      '        <mxCell id="0" />\n' +
      '        <mxCell id="1" parent="0" />\n' +
      cells.join("\n") + "\n" +
      '      </root>\n' +
      '    </mxGraphModel>\n' +
      '  </diagram>\n' +
      '</mxfile>';
  }

  /* ── Export Mermaid ─────────────────────────────────────────────────────────
     Deterministic: reads DOM class hierarchy → Mermaid flowchart with subgraphs.
     Positions are auto-laid out by Mermaid (structural, not spatial export).
     Colors come from getComputedStyle() resolving CSS variables to real RGB.
  ── */
  exportMermaidBtn.addEventListener("click", function () {
    var mmd = buildMermaidText();
    if (!mmd) { showToast("No diagram loaded."); return; }
    var blob = new Blob([mmd], { type: "text/plain" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = loadedFileName.replace(/\.html?$/i, "") + ".mmd";
    a.click();
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 10000);
  });

  function buildMermaidText() {
    var canvas = document.getElementById("diagramCanvas");
    if (!canvas) return null;

    var idN = 0;
    function nxt() { return "n" + (++idN); }

    /* Strip icon elements before reading text */
    function labelText(el) {
      if (!el) return "";
      var c = el.cloneNode(true);
      c.querySelectorAll("i, img").forEach(function (x) { x.remove(); });
      return c.textContent.replace(/\s+/g, " ").trim();
    }

    function rgbHex(rgb) {
      var m = (rgb || "").match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
      if (!m) return null;
      return "#" + [m[1], m[2], m[3]].map(function (n) {
        return ("0" + parseInt(n, 10).toString(16)).slice(-2);
      }).join("");
    }

    /* Mermaid-safe quoted label */
    function mq(s) {
      return '"' + (s || "").replace(/"/g, "#quot;").replace(/[\r\n]+/g, " / ") + '"';
    }

    var classDefs = {};   /* hex → className */
    var structLines = []; /* diagram body lines */

    function getClass(color) {
      var k = (color || "#888888").toLowerCase();
      if (!classDefs[k]) { classDefs[k] = "cls" + Object.keys(classDefs).length; }
      return classDefs[k];
    }

    /* Emit a node line with optional color class */
    function node(indent, id, shape, label, color) {
      var s, e;
      if      (shape === "round") { s = "(";  e = ")";  }
      else if (shape === "db")    { s = "[("; e = ")]"; }
      else if (shape === "hex")   { s = "{{"; e = "}}"; }
      else                        { s = "[";  e = "]";  }
      var cl = color ? ":::" + getClass(color) : "";
      structLines.push(indent + id + s + mq(label) + e + cl);
    }

    var processedCards = new Set();

    /* ── 1. Deployment boundaries / groups → outer subgraphs ── */
    canvas.querySelectorAll(".deployment-boundary, .group").forEach(function (boundary) {
      var bId  = nxt();
      var bLbl = labelText(boundary.querySelector(".boundary-label, .group-label"));
      structLines.push("  subgraph " + bId + "[" + mq(bLbl) + "]");

      /* Nested layers → inner subgraphs */
      boundary.querySelectorAll(".vam-layer").forEach(function (layer) {
        var lId  = nxt();
        var lLbl = labelText(layer.querySelector(".layer-label"));
        structLines.push("    subgraph " + lId + "[" + mq(lLbl) + "]");
        layer.querySelectorAll(".vam-card, .service-card").forEach(function (card) {
          processedCards.add(card);
          var cId   = nxt();
          var ttl   = (card.querySelector(".vam-card-title, .card-title") || { textContent: "" }).textContent.trim();
          var color = rgbHex(getComputedStyle(card).borderLeftColor);
          node("      ", cId, "round", ttl, color);
        });
        structLines.push("    end");
      });

      /* Persistence layer → subgraph with cylinders */
      boundary.querySelectorAll(".persistence-layer").forEach(function (pl) {
        var plId = nxt();
        structLines.push('    subgraph ' + plId + '["Persistence"]');
        pl.querySelectorAll(".db-node").forEach(function (db) {
          var dId   = nxt();
          var name  = (db.querySelector(".db-node-name") || { textContent: "" }).textContent.trim();
          var type  = (db.querySelector(".db-node-type") || { textContent: "" }).textContent.trim();
          var iEl   = db.querySelector(".db-node-icon");
          var color = iEl ? rgbHex(getComputedStyle(iEl).backgroundColor) : "#C74634";
          node("      ", dId, "db", name + (type ? " / " + type : ""), color);
        });
        structLines.push("    end");
      });

      /* Direct service-cards not inside a layer (generic diagrams) */
      boundary.querySelectorAll(".service-card").forEach(function (card) {
        if (processedCards.has(card)) return;
        processedCards.add(card);
        var cId   = nxt();
        var ttl   = (card.querySelector(".card-title") || { textContent: "" }).textContent.trim();
        var color = rgbHex(getComputedStyle(card).borderLeftColor);
        node("    ", cId, "round", ttl, color);
      });

      structLines.push("  end");
      structLines.push("");
    });

    /* ── 2. Hub / OBRH card → hexagon ── */
    canvas.querySelectorAll(".obrh-card").forEach(function (el) {
      var id  = nxt();
      var ttl = (el.querySelector(".obrh-title") || { textContent: "" }).textContent.trim();
      node("  ", id, "hex", ttl, "#0F8799");
      structLines.push("");
    });

    /* ── 3. External column → subgraph of boxes ── */
    var extBoxes = canvas.querySelectorAll(".ext-box");
    if (extBoxes.length) {
      var extId  = nxt();
      var secLbl = labelText(canvas.querySelector(".ext-section-label")) || "External Systems";
      structLines.push("  subgraph " + extId + "[" + mq(secLbl) + "]");
      extBoxes.forEach(function (box) {
        var bId   = nxt();
        var ttl   = labelText(box.querySelector(".ext-box-title"));
        var items = Array.from(box.querySelectorAll(".ext-item"))
          .map(function (i) { return labelText(i); })
          .slice(0, 3).join(" · ");
        node("    ", bId, "rect", ttl + (items ? "\n" + items : ""), "#9E9892");
      });
      structLines.push("  end");
      structLines.push("");
    }

    /* ── 4. Any top-level cards not caught above ── */
    canvas.querySelectorAll(".vam-card, .service-card").forEach(function (card) {
      if (processedCards.has(card)) return;
      processedCards.add(card);
      var cId   = nxt();
      var ttl   = (card.querySelector(".vam-card-title, .card-title") || { textContent: "" }).textContent.trim();
      var color = rgbHex(getComputedStyle(card).borderLeftColor);
      node("  ", cId, "round", ttl, color);
    });

    /* ── Assemble: header + classDefs, then structure ── */
    var header = ["flowchart TD", ""];
    var colorKeys = Object.keys(classDefs);
    colorKeys.forEach(function (k) {
      header.push("  classDef " + classDefs[k] +
        " fill:#FFFFFF,stroke:" + k + ",color:" + k + ",stroke-width:2px");
    });
    if (colorKeys.length) header.push("");

    return header.concat(structLines).join("\n");
  }

  /* ── Save / Copy HTML (reconstructs lean-compatible HTML) ── */
  function buildLeanHtml() {
    var canvas = document.getElementById("diagramCanvas");
    if (!canvas) return "";
    /* Get canvas HTML minus the reviewLayer */
    var canvasClone = canvas.cloneNode(true);
    var rl = canvasClone.querySelector("#reviewLayer");
    if (rl) rl.remove();
    var canvasInner = canvasClone.innerHTML;

    /* Read title from nav bar (editable in edit mode); sub stays as loaded */
    var currentTitle = diagTitleEl ? diagTitleEl.textContent.trim() : loadedTitle;
    var currentSub   = loadedSub;

    return "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n" +
      "<meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n" +
      "<title>" + currentTitle + "</title>\n" +
      "<link rel=\"stylesheet\" href=\"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css\">\n" +
      (diagramCss ? "<style>\n/* DIAGRAM-CSS-START */\n" + diagramCss + "\n/* DIAGRAM-CSS-END */\n</style>\n" : "") +
      "</head>\n<body>\n" +
      "<header class=\"diagram-header\"><h1 class=\"diagram-title\">" + currentTitle + "</h1><p class=\"diagram-sub\">" + currentSub + "</p></header>\n" +
      "<main class=\"diagram-canvas\" id=\"diagramCanvas\">\n" + canvasInner + "\n</main>\n" +
      "<footer class=\"diagram-footer\">" + loadedFooterHtml + "</footer>\n" +
      "</body>\n</html>";
  }

  saveHtmlBtn.addEventListener("click", function () {
    var html = buildLeanHtml();
    var blob = new Blob([html], { type: "text/html" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = loadedFileName || "diagram-edited.html";
    a.click();
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 10000);
  });

  /* ── Helpers ── */
  function escHtml(s) {
    return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function dashArr(style, w) {
    if (style === "dashed") return (w * 2.8).toFixed(1) + " " + (w * 1.8).toFixed(1);
    if (style === "dotted") return "1 " + (w * 2).toFixed(1);
    return "none";
  }
  function hexRgba(hex, a) {
    var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return "rgba(" + r + "," + g + "," + b + "," + a + ")";
  }

})();
</script>
</body>
