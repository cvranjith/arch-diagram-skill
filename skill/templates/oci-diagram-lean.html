<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCI Architecture Diagram</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --ocean: #2C5967;
    --sienna: #AE562C;
    --air: #FCFBFA;
    --neutral-1: #F5F4F2;
    --neutral-2: #DFDCD8;
    --neutral-3: #9E9892;
    --neutral-4: #70736E;
    --bark: #312D2A;
    --oracle-red: #C74634;
    --ivy: #759C6C;
    /* Extended vivid accents */
    --vivid-teal:   #0F8799;
    --vivid-orange: #E06520;
    --vivid-cobalt: #1E5DAB;
    --vivid-forest: #2E8C46;
    --vivid-grape:  #7B4FA0;
    --card-shadow: 0 1px 4px rgba(49,45,42,0.10), 0 0 0 1px rgba(49,45,42,0.06);
    --slide-width: 1366px;
    --slide-height: 768px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--neutral-1);
    font-family: "Oracle Sans", "Segoe UI", Arial, Calibri, sans-serif;
    color: var(--bark);
  }

  .slide-viewport { min-height: 100vh; }
  .slide-frame { width: 100%; }
  .diagram-shell { min-height: 100vh; }

  body.slide-layout { overflow: hidden; }
  body.slide-layout .slide-viewport {
    min-height: 100vh;
    height: 100vh;
    padding: 8px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow: hidden;
  }
  body.slide-layout.slide-scroll .slide-viewport { overflow: auto; }
  body.slide-layout .slide-frame {
    flex: 0 0 auto;
    position: relative;
  }
  body.slide-layout .diagram-shell {
    width: var(--slide-width);
    min-height: var(--slide-height);
    margin: 0;
    background: var(--neutral-1);
    box-shadow: 0 0 0 1px rgba(49,45,42,0.12);
    transform-origin: top left;
  }

  /* ── Navigation bar ── */
  .oci-nav {
    height: 44px;
    background: #142830;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .oci-logo {
    height: 18px;
    filter: brightness(0) invert(1);
  }

  .oci-nav-right {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }

  .nav-btn {
    border: 1px solid rgba(255,255,255,0.24);
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.95);
    border-radius: 5px;
    font-size: 11px;
    padding: 4px 8px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .nav-btn:hover { background: rgba(255,255,255,0.16); }
  .nav-btn.active {
    border-color: rgba(255,255,255,0.52);
    background: rgba(255,255,255,0.22);
  }

  /* ── Diagram header ── */
  .diagram-header {
    padding: 16px 24px 10px;
    border-bottom: 1px solid var(--neutral-2);
  }

  .diagram-title { margin: 0 0 4px; font-size: 20px; }
  .diagram-sub { margin: 0; font-size: 11px; color: var(--neutral-4); }

  /* ── Canvas ── */
  .diagram-canvas {
    padding: 20px 24px;
    min-height: calc(100vh - 44px - 100px - 36px);
    position: relative;
  }

  body.slide-layout .diagram-canvas {
    min-height: calc(var(--slide-height) - 44px - 100px - 36px);
  }

  /* ── Group / boundary ── */
  .group {
    border: 1px solid var(--neutral-3);
    border-radius: 4px;
    padding: 28px 12px 12px;
    background: #E8E4DF;
    position: relative;
  }

  .group-label {
    position: absolute;
    top: 8px;
    left: 12px;
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--bark);
    font-weight: 700;
  }

  /* ── Cards grid ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 8px;
  }

  /* ── Service card ── */
  .service-card {
    position: relative;
    background: #FFFFFF;
    border: 1px solid #C9C3BC;
    box-shadow: 0 1px 4px rgba(49,45,42,0.12), 0 0 0 1px rgba(44,89,103,0.07);
    border-radius: 5px;
    padding: 10px 12px 10px 15px;
  }

  .service-card::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 5px;
    border-radius: 5px 0 0 5px;
    background: var(--card-accent, var(--ocean));
  }

  .card-header,
  .service-head {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 4px;
  }

  .card-icon,
  .service-icon {
    width: 22px;
    height: 22px;
    color: var(--card-accent, var(--ocean));
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 5px;
    background: rgba(44,89,103,0.15);
    box-shadow: inset 0 0 0 1px rgba(44,89,103,0.25);
    flex-shrink: 0;
    font-size: 13px;
  }
  .card-icon img, .service-icon img { width: 15px; height: 15px; }

  /* ── Category-matched chip variants ── */
  .chip-ocean  { background: rgba(44,89,103,0.15);   box-shadow: inset 0 0 0 1px rgba(44,89,103,0.25);   color: #2C5967; }
  .chip-sienna { background: rgba(174,86,44,0.13);   box-shadow: inset 0 0 0 1px rgba(174,86,44,0.22);   color: #AE562C; }
  .chip-red    { background: rgba(199,70,52,0.12);   box-shadow: inset 0 0 0 1px rgba(199,70,52,0.20);   color: #C74634; }
  .chip-ivy    { background: rgba(117,156,108,0.13); box-shadow: inset 0 0 0 1px rgba(117,156,108,0.22); color: #759C6C; }
  .chip-bark   { background: rgba(49,45,42,0.10);    box-shadow: inset 0 0 0 1px rgba(49,45,42,0.18);    color: #312D2A; }
  .chip-vivid-teal   { background: rgba(15,135,153,0.13); box-shadow: inset 0 0 0 1px rgba(15,135,153,0.25); color: #0F8799; }
  .chip-vivid-orange { background: rgba(224,101,32,0.13); box-shadow: inset 0 0 0 1px rgba(224,101,32,0.25); color: #E06520; }
  .chip-vivid-cobalt { background: rgba(30,93,171,0.13);  box-shadow: inset 0 0 0 1px rgba(30,93,171,0.25);  color: #1E5DAB; }
  .chip-vivid-forest { background: rgba(46,140,70,0.13);  box-shadow: inset 0 0 0 1px rgba(46,140,70,0.25);  color: #2E8C46; }
  .chip-vivid-grape  { background: rgba(123,79,160,0.13); box-shadow: inset 0 0 0 1px rgba(123,79,160,0.25); color: #7B4FA0; }

  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--card-accent, var(--ocean));
    line-height: 1.3;
  }

  .card-items { list-style: none; margin: 0; padding: 0; }
  .card-items li { font-size: 10px; line-height: 1.6; }

  /* ── DB node (reusable persistence component) ── */
  .db-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    background: #FFFFFF;
    border: 1.5px solid var(--neutral-2);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
    min-width: 120px;
  }
  .db-node-icon {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--db-color, var(--ocean));
    display: flex;
    align-items: center;
    justify-content: center;
    color: #FFFFFF;
    font-size: 15px;
  }
  .db-node-icon img {
    width: 18px;
    height: 18px;
    object-fit: contain;
    filter: brightness(0) invert(1);
  }
  .db-node-name {
    font-size: 10px;
    font-weight: 700;
    color: var(--bark);
    line-height: 1.3;
  }
  .db-node-type {
    font-size: 8.5px;
    color: var(--neutral-4);
    line-height: 1.3;
  }

  /* ── Footer ── */
  .diagram-footer {
    min-height: 36px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-top: 1px solid var(--neutral-2);
    background: #FFFFFF;
    padding: 8px 24px;
    font-size: 10px;
    color: var(--neutral-4);
  }

  .diagram-confidential {
    margin-left: auto;
    color: var(--neutral-3);
    font-style: italic;
  }

  /* ── Version nav pill (fixed bottom-right) ── */
  .ver-nav {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 2px;
    background: rgba(20,40,48,0.92);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 5px 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.85);
    backdrop-filter: blur(4px);
  }
  .ver-nav a, .ver-nav span {
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    padding: 2px 6px;
    border-radius: 12px;
  }
  .ver-nav a:hover { background: rgba(255,255,255,0.15); }
  .ver-nav .ver-current {
    font-weight: 700;
    color: #FFFFFF;
    background: rgba(255,255,255,0.12);
  }
  .ver-nav .ver-sep {
    color: rgba(255,255,255,0.35);
    padding: 0 2px;
    font-size: 9px;
  }
  .ver-nav a.ver-disabled {
    opacity: 0.3;
    pointer-events: none;
  }

  @media (max-width: 960px) {
    .cards { grid-template-columns: 1fr; }
    .oci-nav-right { gap: 6px; }
  }

  /* ═══════════════════════════════════════════════════════════════════

     DIAGRAM-CSS-END
     ═══════════════════════════════════════════════════════════════════ */
</style>
</head>

<!-- Version navigation pill (bottom-right) -->
<nav class="ver-nav" id="verNav" aria-label="Version navigation"></nav>

<script>
(function () {
  var SLIDE_W = 1366, SLIDE_H = 768;
  var MIN_SCALE = 0.42;

  /* ── Open in Viewer link ──
     arch-viewer.html lives two levels up from output/<project>/ */
  var viewerLink = document.getElementById("openInViewer");
  if (viewerLink) {
    /* Try relative path first (works when opened as file:// from output/<project>/) */
    viewerLink.href = "../../arch-viewer.html?file=" +
      encodeURIComponent(window.location.pathname.split("/").pop() || "");
  }

  /* ── Slide layout — DEFAULT ON ── */
  function applySlideScale() {
    var sv = document.getElementById("slideViewport");
    var ds = document.getElementById("diagramShell");
    var sf = document.getElementById("slideFrame");
    if (!sv || !ds) return;
    /* 52px reserve: version pill (fixed bottom-right) + breathing room */
    var w = sv.clientWidth - 24;
    var h = sv.clientHeight - 24 - 52;
    var scale = Math.max(MIN_SCALE, Math.min(1, Math.min(w / SLIDE_W, h / SLIDE_H)));
    ds.style.transform = "scale(" + scale + ")";
    if (sf) { sf.style.width = (SLIDE_W * scale) + "px"; sf.style.height = (SLIDE_H * scale) + "px"; }
  }

  /* Default ON unless ?slide=0 explicitly opts out */
  if (new URLSearchParams(window.location.search).get("slide") !== "0") {
    document.body.classList.add("slide-layout");
    requestAnimationFrame(applySlideScale);
    window.addEventListener("resize", applySlideScale);
  }

  /* ── Version nav pill ── */
  var nav = document.getElementById("verNav");
  var filename = window.location.pathname.split("/").pop() || "";
  var m = filename.match(/^(.+?)-v(\d+)(\.html?)$/i);
  if (m && nav) {
    var base = m[1], n = parseInt(m[2], 10), ext = m[3];
    nav.innerHTML =
      (n > 1
        ? '<a href="' + base + "-v" + (n - 1) + ext + '" title="Previous version">&#8592; v' + (n - 1) + '</a>'
        : '<a class="ver-disabled" aria-disabled="true">&#8592;</a>') +
      '<span class="ver-sep">|</span>' +
      '<span class="ver-current">v' + n + '</span>' +
      '<span class="ver-sep">|</span>' +
      '<a href="' + base + "-v" + (n + 1) + ext + '" title="Next version">v' + (n + 1) + ' &#8594;</a>';
  } else if (nav) {
    nav.style.display = "none";
  }
})();
</script>
