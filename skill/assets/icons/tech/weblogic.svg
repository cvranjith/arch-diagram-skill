<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Oracle WebLogic Server — Oracle red server rack -->
  <!-- Server chassis -->
  <rect x="5" y="7" width="38" height="34" rx="5" fill="#C74634"/>
  <!-- Rack unit 1 -->
  <rect x="10" y="12" width="28" height="9" rx="2" fill="rgba(0,0,0,0.18)"/>
  <!-- Rack unit 2 -->
  <rect x="10" y="24" width="28" height="9" rx="2" fill="rgba(0,0,0,0.18)"/>
  <!-- LED status lights -->
  <circle cx="13" cy="38" r="2.5" fill="#4CAF50"/>
  <circle cx="20" cy="38" r="2.5" fill="#FF9800"/>
  <!-- Drive slot -->
  <rect x="27" y="35" width="13" height="6" rx="1.5" fill="rgba(0,0,0,0.22)"/>
  <!-- Oracle "O" ring on top rack -->
  <ellipse cx="24" cy="16.5" rx="7" ry="4" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- "WL" initials on bottom rack -->
  <text x="24" y="31" text-anchor="middle" fill="white" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="7.5" letter-spacing="0.5">WL</text>
</svg>
